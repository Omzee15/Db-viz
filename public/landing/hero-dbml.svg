<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DBML editor with live preview">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2D2A24"/><stop offset="1" stop-color="#211E18"/></linearGradient>
    <filter id="dsh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#dbg)"/>
  <!-- top bar -->
  <circle cx="40" cy="36" r="8" fill="#C4756C"/><circle cx="70" cy="36" r="8" fill="#D9B36C"/><circle cx="100" cy="36" r="8" fill="#9B8F5E"/>
  <rect x="640" y="20" width="320" height="32" rx="16" fill="#3A362E"/>
  <text x="800" y="42" text-anchor="middle" font-family="Geist Mono, monospace" font-size="16" fill="#8B7355">schema.dbml</text>
  <line x1="0" y1="72" x2="1600" y2="72" stroke="#3A362E" stroke-width="2"/>
  <!-- split: editor | preview -->
  <line x1="820" y1="72" x2="820" y2="1000" stroke="#3A362E" stroke-width="2"/>

  <!-- editor code -->
  <g font-family="Geist Mono, monospace" font-size="24">
    <text x="60" y="160" fill="#8B7355">Table</text><text x="150" y="160" fill="#EADFCD">users {</text>
    <text x="100" y="208" fill="#9B8F5E">id</text><text x="200" y="208" fill="#D9B36C">uuid</text><text x="300" y="208" fill="#8B7355">[pk]</text>
    <text x="100" y="256" fill="#9B8F5E">name</text><text x="220" y="256" fill="#D9B36C">text</text>
    <text x="100" y="304" fill="#9B8F5E">email</text><text x="220" y="304" fill="#D9B36C">text</text><text x="300" y="304" fill="#8B7355">[unique]</text>
    <text x="60" y="352" fill="#EADFCD">}</text>
    <text x="60" y="448" fill="#8B7355">Table</text><text x="150" y="448" fill="#EADFCD">orders {</text>
    <text x="100" y="496" fill="#9B8F5E">id</text><text x="200" y="496" fill="#D9B36C">uuid</text><text x="300" y="496" fill="#8B7355">[pk]</text>
    <text x="100" y="544" fill="#9B8F5E">user_id</text><text x="280" y="544" fill="#D9B36C">uuid</text>
    <text x="100" y="592" fill="#9B8F5E">total</text><text x="230" y="592" fill="#D9B36C">decimal</text>
    <text x="60" y="640" fill="#EADFCD">}</text>
    <text x="60" y="736" fill="#C4A86C">Ref:</text><text x="150" y="736" fill="#EADFCD">orders.user_id &gt; users.id</text>
  </g>
  <rect x="490" y="716" width="4" height="28" fill="#9B8F5E"/>

  <!-- preview diagram -->
  <g filter="url(#dsh)">
    <rect x="900" y="180" width="240" height="180" rx="12" fill="#3A362E"/>
    <rect x="900" y="180" width="240" height="40" rx="12" fill="#9B8F5E"/><rect x="900" y="205" width="240" height="15" fill="#9B8F5E"/>
    <text x="922" y="208" font-family="Geist, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">users</text>
    <rect x="922" y="248" width="120" height="10" rx="5" fill="#5A5446"/>
    <rect x="922" y="278" width="160" height="10" rx="5" fill="#4A4438"/>
    <rect x="922" y="308" width="140" height="10" rx="5" fill="#5A5446"/>
  </g>
  <path d="M1140 350 C 1240 350, 1140 480, 1240 480" stroke="#9B8F5E" stroke-width="3" fill="none"/>
  <g filter="url(#dsh)">
    <rect x="1240" y="420" width="240" height="180" rx="12" fill="#3A362E"/>
    <rect x="1240" y="420" width="240" height="40" rx="12" fill="#9B8F5E"/><rect x="1240" y="445" width="240" height="15" fill="#9B8F5E"/>
    <text x="1262" y="448" font-family="Geist, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">orders</text>
    <rect x="1262" y="488" width="120" height="10" rx="5" fill="#5A5446"/>
    <rect x="1262" y="518" width="160" height="10" rx="5" fill="#4A4438"/>
    <rect x="1262" y="548" width="100" height="10" rx="5" fill="#5A5446"/>
  </g>
</svg>
