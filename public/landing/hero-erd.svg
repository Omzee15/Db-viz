<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interactive ER diagram">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#EFE6D6"/>
    </linearGradient>
    <pattern id="hgrid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#D9CDBF" stroke-width="1" opacity="0.5"/>
    </pattern>
    <filter id="hsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#3E2723" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#hbg)"/>
  <rect width="1600" height="1000" fill="url(#hgrid)"/>

  <!-- toolbar -->
  <rect x="0" y="0" width="1600" height="60" fill="#FBF7F0"/>
  <line x1="0" y1="60" x2="1600" y2="60" stroke="#D9CDBF"/>
  <circle cx="36" cy="30" r="7" fill="#C4756C"/><circle cx="62" cy="30" r="7" fill="#D9B36C"/><circle cx="88" cy="30" r="7" fill="#9B8F5E"/>
  <rect x="140" y="16" width="180" height="28" rx="8" fill="#F3ECE0"/>
  <text x="158" y="35" font-family="Geist Mono, monospace" font-size="15" fill="#8B7355">schema.dbml</text>

  <!-- edges -->
  <path d="M470 300 C 590 300, 590 560, 720 560" stroke="#9B8F5E" stroke-width="3" fill="none"/>
  <path d="M1150 380 C 1010 380, 1010 560, 920 560" stroke="#9B8F5E" stroke-width="3" fill="none"/>
  <path d="M820 720 L 820 800" stroke="#9B8F5E" stroke-width="3" fill="none"/>

  <!-- users -->
  <g filter="url(#hsh)">
    <rect x="190" y="190" width="280" height="230" rx="14" fill="#FFFFFF"/>
    <rect x="190" y="190" width="280" height="48" rx="14" fill="#9B8F5E"/><rect x="190" y="220" width="280" height="18" fill="#9B8F5E"/>
    <text x="216" y="222" font-family="Geist, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">users</text>
    <text x="216" y="288" font-family="Geist Mono, monospace" font-size="18" fill="#8B7355">id</text><text x="400" y="288" font-family="Geist Mono, monospace" font-size="16" fill="#B0A48F">uuid pk</text>
    <text x="216" y="328" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">name</text><text x="400" y="328" font-family="Geist Mono, monospace" font-size="16" fill="#B0A48F">text</text>
    <text x="216" y="368" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">email</text><text x="400" y="368" font-family="Geist Mono, monospace" font-size="16" fill="#B0A48F">text</text>
    <text x="216" y="408" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">created_at</text>
  </g>

  <!-- orders -->
  <g filter="url(#hsh)">
    <rect x="720" y="470" width="300" height="250" rx="14" fill="#FFFFFF"/>
    <rect x="720" y="470" width="300" height="48" rx="14" fill="#9B8F5E"/><rect x="720" y="500" width="300" height="18" fill="#9B8F5E"/>
    <text x="746" y="502" font-family="Geist, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">orders</text>
    <text x="746" y="568" font-family="Geist Mono, monospace" font-size="18" fill="#8B7355">id</text><text x="940" y="568" font-family="Geist Mono, monospace" font-size="16" fill="#B0A48F">uuid pk</text>
    <text x="746" y="608" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">user_id</text><text x="940" y="608" font-family="Geist Mono, monospace" font-size="16" fill="#B0A48F">fk</text>
    <text x="746" y="648" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">total</text>
    <text x="746" y="688" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">status</text>
  </g>

  <!-- products -->
  <g filter="url(#hsh)">
    <rect x="1150" y="250" width="270" height="230" rx="14" fill="#FFFFFF"/>
    <rect x="1150" y="250" width="270" height="48" rx="14" fill="#9B8F5E"/><rect x="1150" y="280" width="270" height="18" fill="#9B8F5E"/>
    <text x="1176" y="282" font-family="Geist, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">products</text>
    <text x="1176" y="348" font-family="Geist Mono, monospace" font-size="18" fill="#8B7355">id</text>
    <text x="1176" y="388" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">name</text>
    <text x="1176" y="428" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">price</text>
    <text x="1176" y="468" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">sku</text>
  </g>

  <!-- order_items -->
  <g filter="url(#hsh)">
    <rect x="680" y="800" width="290" height="150" rx="14" fill="#FFFFFF"/>
    <rect x="680" y="800" width="290" height="48" rx="14" fill="#9B8F5E"/><rect x="680" y="830" width="290" height="18" fill="#9B8F5E"/>
    <text x="706" y="832" font-family="Geist, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">order_items</text>
    <text x="706" y="898" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">order_id</text>
    <text x="706" y="934" font-family="Geist Mono, monospace" font-size="18" fill="#3E2723">product_id</text>
  </g>
</svg>
