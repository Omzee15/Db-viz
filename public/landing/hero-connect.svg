<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Connect a live PostgreSQL database">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FBF7F0"/><stop offset="1" stop-color="#EFE6D6"/></linearGradient>
    <filter id="csh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#3E2723" flood-opacity="0.16"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#cbg)"/>

  <!-- db cylinder -->
  <g>
    <ellipse cx="280" cy="430" rx="120" ry="40" fill="#9B8F5E"/>
    <path d="M160 430 V 600 a120 40 0 0 0 240 0 V 430" fill="#B3A874"/>
    <ellipse cx="280" cy="430" rx="120" ry="40" fill="#9B8F5E"/>
    <ellipse cx="280" cy="515" rx="120" ry="40" fill="none" stroke="#FBF7F0" stroke-width="4" opacity="0.5"/>
    <text x="280" y="690" text-anchor="middle" font-family="Geist Mono, monospace" font-size="26" fill="#8B7355">PostgreSQL</text>
  </g>
  <path d="M400 515 H 560" stroke="#9B8F5E" stroke-width="5" stroke-dasharray="14 12"/>

  <!-- connection modal -->
  <g filter="url(#csh)">
    <rect x="560" y="230" width="780" height="560" rx="24" fill="#FFFFFF"/>
    <text x="610" y="320" font-family="Geist, sans-serif" font-size="38" font-weight="700" fill="#3E2723">Connect database</text>
    <text x="610" y="362" font-family="Geist, sans-serif" font-size="22" fill="#8B7355">Import your schema directly from PostgreSQL</text>

    <text x="610" y="428" font-family="Geist, sans-serif" font-size="20" font-weight="600" fill="#3E2723">Connection string</text>
    <rect x="610" y="446" width="680" height="64" rx="12" fill="#F5EEE5" stroke="#D9CDBF" stroke-width="2"/>
    <text x="636" y="486" font-family="Geist Mono, monospace" font-size="20" fill="#8B7355">postgres://user:•••@host:5432/db</text>

    <text x="610" y="566" font-family="Geist, sans-serif" font-size="20" font-weight="600" fill="#3E2723">Schema</text>
    <rect x="610" y="584" width="680" height="64" rx="12" fill="#F5EEE5" stroke="#D9CDBF" stroke-width="2"/>
    <text x="636" y="624" font-family="Geist Mono, monospace" font-size="20" fill="#3E2723">public</text>

    <rect x="610" y="688" width="680" height="68" rx="14" fill="#9B8F5E"/>
    <text x="950" y="731" text-anchor="middle" font-family="Geist, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF">Connect &amp; import schema</text>
  </g>
</svg>
